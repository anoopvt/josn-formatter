<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A fast, lightweight JSON formatter, validator, minifier, repair helper, and search tool.">
    <title>JSON Formatter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">Lightweight JSON Tool</p>
            <h1 id="app-title">JSON Formatter</h1>
          </div>
          <div class="status" id="status" role="status" aria-live="polite">Ready</div>
        </header>

        <div class="toolbar" aria-label="JSON actions">
          <div class="segmented" role="group" aria-label="Output style">
            <button class="mode-button active" type="button" data-mode="pretty">Structured</button>
            <button class="mode-button" type="button" data-mode="compact">Single line</button>
          </div>
          <button class="primary" type="button" id="formatBtn">Format JSON</button>
          <button type="button" id="repairBtn">Repair & format</button>
          <button type="button" id="clearBtn">Clear</button>
          <button type="button" id="copyBtn">Copy output</button>
        </div>

        <div class="searchbar">
          <label for="searchInput">Search JSON</label>
          <input id="searchInput" type="search" placeholder="Key, value, or text">
          <span id="searchCount" aria-live="polite">0 matches</span>
        </div>

        <section class="editors" aria-label="JSON input and output">
          <div class="panel">
            <div class="panel-header">
              <h2>Input</h2>
              <span>Paste JSON here</span>
            </div>
            <textarea id="jsonInput" spellcheck="false" autocomplete="off"></textarea>
          </div>

          <div class="panel">
            <div class="panel-header">
              <h2>Output</h2>
              <span id="outputMeta">No output yet</span>
            </div>
            <pre id="jsonOutput" tabindex="0"><code></code></pre>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
